name: Build Portable Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-22.04, windows-latest, macos-latest, macos-14]
        include:
          - os: ubuntu-22.04
            artifact_name: kinescope-bot-linux
            platform: linux
          - os: windows-latest
            artifact_name: kinescope-bot-windows.exe
            platform: windows
          - os: macos-latest
            artifact_name: kinescope-bot-macos
            platform: darwin
          - os: macos-14
            artifact_name: kinescope-bot-macos-arm64
            platform: darwin_arm64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies (Linux)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk tk-dev

      - name: Install system dependencies (macOS)
        if: startsWith(matrix.os, 'macos')
        run: |
          brew install tcl-tk
          echo "TCL_LIBRARY=$(brew --prefix tcl-tk)/lib/tcl9.0" >> $GITHUB_ENV
          echo "TK_LIBRARY=$(brew --prefix tcl-tk)/lib/tk9.0" >> $GITHUB_ENV

      - name: Install Python dependencies
        run: |
          pip install pyinstaller
          pip install aiohttp customtkinter

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --name ${{ matrix.artifact_name }} GBOTV1.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/kinescope-bot-linux/kinescope-bot-linux
            artifacts/kinescope-bot-windows.exe/kinescope-bot-windows.exe
            artifacts/kinescope-bot-macos/kinescope-bot-macos
            artifacts/kinescope-bot-macos-arm64/kinescope-bot-macos-arm64
          generate_release_notes: true
          overwrite: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
